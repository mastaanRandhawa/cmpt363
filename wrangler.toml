# Cloudflare Pages (static Vite build → dist/)
#
# Git integration — pick ONE:
#   A) Recommended: Build command = "npm run build", Build output directory = "dist",
#      leave "Deploy command" EMPTY (Pages uploads dist automatically).
#   B) If you use a Deploy command, it must be Pages, NOT Workers:
#        npx wrangler pages deploy dist --project-name=cmpt363
#      Do NOT use: npx wrangler deploy  (that targets Workers and will fail).
#
# Manual: npm run pages:deploy
name = "cmpt363"
compatibility_date = "2025-04-01"

pages_build_output_dir = "dist"
