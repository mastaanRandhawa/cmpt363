# Cloudflare Pages (static Vite build → dist/)
#
# DASHBOARD (Workers & Pages → cmpt363 → Settings → Builds):
#   Build command:        npm run build
#   Build output:         dist
#   Deploy command:       npm run deploy
#     OR leave Deploy command EMPTY (Pages publishes "dist" on its own — preferred).
#   WRONG (will fail):    npx wrangler deploy   ← Workers only, not Pages
#
# Local: npm run pages:deploy
name = "cmpt363"
compatibility_date = "2025-04-01"

pages_build_output_dir = "dist"
